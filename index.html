<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Quest</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:url("background.jpg") no-repeat center center fixed;
    background-size:100% 100%;
    font-family:serif;
    cursor:none;
}

/* AUTOPLAY OVERLAY */
#startOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:32px;
    text-align:center;
    z-index:99999;
    cursor:pointer;
    flex-direction:column;
    opacity:1;
    transition:opacity 0.5s ease;
}

/* icon container aligned in a vertical column on left side */
.icon-container{
    position:fixed;
    left:20px; /* distance from left edge */
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction: column; /* vertical column */
    gap:30px; /* space between icons */
    z-index:10;
}

/* gift icons with circular frames and magical aura */
.icon-wrapper{
    position:relative;
    width:130px;
    height:130px;
}

.icon{
    position:absolute;
    width:130px;
    height:130px;           
    border-radius:50%;       
    border:3px solid gold;   
    box-shadow: 0 0 15px rgba(255,215,0,0.6); 
    background: rgba(0,0,0,0.3); /* inner background */
    cursor:pointer;
    transition: transform 0.25s ease, filter 0.25s ease, box-shadow 0.25s ease;
    overflow:hidden; 
    z-index:2;
}

.icon:hover{
    transform:scale(1.35);
    filter:drop-shadow(0 0 25px gold);
    box-shadow: 0 0 25px rgba(255,215,0,0.9);
    background: rgba(0,0,0,0.5);
}

/* magical aura animation behind icons */
.aura{
    position:absolute;
    width:160px;
    height:160px;
    top:-15px;
    left:-15px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,255,0,0.4), rgba(255,215,0,0));
    filter:blur(12px);
    animation: pulse 2s infinite alternate;
    z-index:1;
}

@keyframes pulse{
    0%{transform: scale(1);}
    50%{transform: scale(1.2);}
    100%{transform: scale(1);}
}

/* paimon cursor */
#paimonCursor{
    position:fixed;
    width:80px;
    pointer-events:none;
    z-index:9999;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0)}
    50%{transform:translateY(-8px)}
    100%{transform:translateY(0)}
}

/* overlay scenes */
.scene{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:black;
    flex-direction:column;
}

/* fullscreen media */
.full{
    width:100vw;
    height:100vh;
    object-fit:cover;
}

/* genshin dialogue */
.dialogue{
    position:absolute;
    bottom:40px;
    background:rgba(20,30,60,0.9);
    border:3px solid gold;
    border-radius:12px;
    padding:20px;
    color:white;
    font-size:26px;
    text-align:center;
    box-shadow:0 0 15px gold;
}

button{
    margin-top:15px;
    padding:10px 25px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:gold;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- AUTOPLAY START OVERLAY -->
<div id="startOverlay">Click anywhere to start 🎵</div>

<!-- MAIN PAGE BACKGROUND MUSIC -->
<audio id="bgMusic" loop autoplay muted>
<source src="main-music.mp3" type="audio/mpeg">
</audio>

<!-- PAIMON CURSOR -->
<img id="paimonCursor" src="paimon.png">

<!-- ICONS WITH AURA -->
<div class="icon-container">
    <div class="icon-wrapper">
        <div class="aura"></div>
        <img src="gift1.webp" class="icon" onclick="openScene(1)">
    </div>
    <div class="icon-wrapper">
        <div class="aura"></div>
        <img src="gift2.webp" class="icon" onclick="openScene(2)">
    </div>
    <div class="icon-wrapper">
        <div class="aura"></div>
        <img src="gift3.webp" class="icon" onclick="openScene(3)">
    </div>
</div>

<!-- SCENE 1 -->
<div class="scene" id="scene1">
    <img src="image1.png" class="full">
    <div class="dialogue">
        Tanjoubi Omedetou !!! 🎉
        <br>
        <button onclick="closeScenes()">Return</button>
    </div>
</div>

<!-- SCENE 2 -->
<div class="scene" id="scene2">
    <img src="fatui.png" class="full">
    <audio id="music">
        <source src="soundtrack.mp3" type="audio/mpeg">
    </audio>
</div>

<!-- SCENE 3 -->
<div class="scene" id="scene3">
    <video id="video" class="full">
        <source src="video.mp4" type="video/mp4">
    </video>
</div>

<script>

/* START MAIN PAGE MUSIC WITH FADE-IN */
const bgMusic = document.getElementById("bgMusic");
const startOverlay = document.getElementById("startOverlay");

function startMusic(){
    bgMusic.volume = 0; // start muted
    bgMusic.play().then(()=>{
        // fade-in
        let vol = 0;
        const fade = setInterval(() => {
            if(vol < 0.5){
                vol += 0.02;
                bgMusic.volume = vol;
            } else {
                clearInterval(fade);
            }
        }, 100);
    }).catch(()=>{});
    // hide overlay
    startOverlay.style.opacity = 0;
    setTimeout(()=>startOverlay.style.display="none",500);
}

// overlay click triggers music
startOverlay.addEventListener("click", startMusic);

// try to autoplay immediately if browser allows
window.addEventListener("load", () => {
    bgMusic.play().then(()=>startMusic()).catch(()=>{});
});

/* PAIMON FOLLOW CURSOR */
document.addEventListener("mousemove", e => {
    let p = document.getElementById("paimonCursor");
    p.style.left = e.clientX + "px";
    p.style.top = e.clientY + "px";
});

/* OPEN SCENES */
function openScene(n){
    bgMusic.pause();
    document.querySelectorAll(".scene").forEach(s => s.style.display = "none");
    document.getElementById("scene"+n).style.display = "flex";

    if(n===2){
        let m = document.getElementById("music");
        m.currentTime = 0;
        m.play();
        m.onended = closeScenes;
    }

    if(n===3){
        let v = document.getElementById("video");
        v.currentTime = 0;
        v.play();
        v.onended = closeScenes;
    }
}

/* RETURN TO MAIN PAGE */
function closeScenes(){
    document.querySelectorAll(".scene").forEach(s => s.style.display = "none");
    bgMusic.play();
}

</script>

</body>
</html>
